<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60" width="280" height="60">
  <!-- Definición del degradado para la hojita/aceituna -->
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A3C293" />
      <stop offset="100%" stop-color="#7A9A6A" />
    </linearGradient>
  </defs>

  <!-- ICONO INTEGRADOR: Hojita + Aceituna estilizada en la 'O' -->
  <g transform="translate(10, 8)">
    <!-- Aceituna base -->
    <ellipse cx="18" cy="28" rx="8" ry="12" fill="url(#leafGrad)" transform="rotate(-15 18 28)"/>
    <!-- Detalle de la hoja superior -->
    <path d="M 18 16 C 24 8, 32 6, 36 2 C 34 10, 28 18, 18 20 Z" fill="#A3C293"/>
  </g>

  <!-- TEXTO DEL LOGO -->
  <!-- "Oli" en blanco elegante -->
  <text x="62" y="40" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="500" fill="#FFFFFF" letter-spacing="-0.5">Oli</text>
  
  <!-- "Book" en negrita con el verde de la marca -->
  <text x="104" y="40" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif" font-size="32" font-weight="800" fill="#A3C293" letter-spacing="-0.5">Book</text>
</svg>
