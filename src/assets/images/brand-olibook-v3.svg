<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <!-- Degradados para la aceituna y la hoja -->
    <linearGradient id="oliGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C2E2A3" />
      <stop offset="100%" stop-color="#88AB75" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B5D99C" />
      <stop offset="100%" stop-color="#6E935B" />
    </linearGradient>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&amp;display=swap');
    
    .brand-text-oli {
      font-family: 'Nunito', 'Arial Rounded MT Bold', -apple-system, sans-serif;
      font-size: 40px;
      font-weight: 800;
      fill: #FFFFFF;
      letter-spacing: -0.5px;
    }
    
    .brand-text-book {
      font-family: 'Nunito', 'Arial Rounded MT Bold', -apple-system, sans-serif;
      font-size: 40px;
      font-weight: 900;
      fill: #B5D99C;
      letter-spacing: -0.5px;
    }
  </style>

  <g transform="translate(10, 5)">
    <!-- 1. LA 'O' INTEGRADA COMO ACEITUNA -->
    <g transform="translate(28, 44) rotate(-15)">
      <!-- Cuerpo ovalado de la aceituna -->
      <ellipse cx="0" cy="0" rx="14" ry="19" fill="url(#oliGreen)" />
      <!-- Ojo interior para garantizar legibilidad de la letra O -->
      <ellipse cx="0" cy="0" rx="5" ry="9" fill="#4A5D4E" />
      <!-- Destello de brillo -->
      <path d="M -8 -9 A 10 14 0 0 1 0 -16" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" opacity="0.7" />
    </g>

    <!-- 2. LA 'l' Y LA 'i' -->
    <text x="48" y="52" class="brand-text-oli">li</text>

    <!-- 3. HOJITA CON RABITO SOBRE LA 'i' (Sustituye al punto) -->
    <g transform="translate(68, 14)">
      <!-- Tallo curvo -->
      <path d="M 0 12 Q 3 4 9 1" fill="none" stroke="#B5D99C" stroke-width="2.5" stroke-linecap="round" />
      <!-- Hojita verde brote -->
      <path d="M 8 2 C 14 -4, 22 -2, 23 4 C 17 7, 11 5, 8 2 Z" fill="url(#leafGrad)" />
    </g>

    <!-- 4. PALABRA "Book" -->
    <text x="86" y="52" class="brand-text-book">Book</text>
  </g>
</svg>
